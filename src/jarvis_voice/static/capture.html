<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#0b0b0b">
<meta name="jarvis-key" content="__JARVIS_KEY__">
<link rel="manifest" href="/manifest.json">
<title>Jarvis Capture</title>
<style>
  :root { color-scheme: dark; }
  html, body { margin: 0; padding: 0; height: 100%; background: #0b0b0b; color: #eee;
    font-family: -apple-system, Roboto, system-ui, sans-serif; }
  main { display: flex; flex-direction: column; align-items: center; justify-content: center;
    height: 100dvh; padding: env(safe-area-inset-top) 16px env(safe-area-inset-bottom); gap: 24px; }
  button#mic { width: 200px; height: 200px; border-radius: 50%; border: none;
    background: #c93b3b; color: #fff; font-size: 20px; font-weight: 600;
    box-shadow: 0 8px 32px rgba(201,59,59,.4); touch-action: manipulation; }
  button#mic.recording { background: #3bc97a; animation: pulse 1.2s infinite; }
  button#mic:disabled { opacity: .5; }
  @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
  #status { font-size: 14px; opacity: .7; min-height: 1.4em; text-align: center; }
  #transcript { width: 100%; max-width: 480px; min-height: 80px; padding: 12px;
    background: #1a1a1a; border-radius: 12px; font-size: 15px; line-height: 1.4;
    white-space: pre-wrap; overflow-wrap: anywhere;
    cursor: pointer; transition: background 150ms ease, transform 150ms ease; }
  #transcript:hover { background: #232323; }
  #transcript:focus-visible { outline: 2px solid #3bc97a; outline-offset: 2px; }
  #transcript.copied { background: #1f3a2a; animation: copyFlash 420ms ease; }
  @keyframes copyFlash { 0% { transform: scale(1); } 40% { transform: scale(1.03); } 100% { transform: scale(1); } }
  #log { width: 100%; max-width: 480px; font-size: 12px; opacity: .6; min-height: 1.2em; text-align: center; }
  #toast { position: fixed; left: 50%; bottom: calc(env(safe-area-inset-bottom) + 24px);
    transform: translateX(-50%); background: #1a1a1a; color: #3bc97a;
    padding: 10px 18px; border-radius: 999px; font-size: 14px; font-weight: 600;
    box-shadow: 0 4px 16px rgba(0,0,0,.4); pointer-events: none; z-index: 10; }
  #toast.show { animation: toastIn 1400ms ease forwards; }
  @keyframes toastIn {
    0% { opacity: 0; transform: translate(-50%, 12px); }
    15%, 75% { opacity: 1; transform: translate(-50%, 0); }
    100% { opacity: 0; transform: translate(-50%, -8px); }
  }
</style>
</head>
<body>
<main>
  <div id="transcript" role="button" tabindex="0" aria-live="polite" title="Tap to copy"></div>
  <button id="mic" type="button">Tap to talk</button>
  <div id="status">Ready</div>
  <div id="log"></div>
  <div id="toast" role="status" aria-live="polite" hidden></div>
</main>
<script>
(() => {
  const key = document.querySelector('meta[name=jarvis-key]').content;
  const micBtn = document.getElementById('mic');
  const statusEl = document.getElementById('status');
  const transcriptEl = document.getElementById('transcript');
  const logEl = document.getElementById('log');
  const toastEl = document.getElementById('toast');

  let toastTimer = 0;
  function showToast(msg) {
    toastEl.textContent = msg;
    toastEl.hidden = false;
    toastEl.classList.remove('show');
    void toastEl.offsetWidth;
    toastEl.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => {
      toastEl.classList.remove('show');
      toastEl.hidden = true;
    }, 1400);
  }

  function fallbackCopy(text) {
    const ta = document.createElement('textarea');
    ta.value = text;
    ta.setAttribute('readonly', '');
    ta.style.position = 'fixed';
    ta.style.opacity = '0';
    document.body.appendChild(ta);
    ta.select();
    let ok = false;
    try { ok = document.execCommand('copy'); } catch (_) { ok = false; }
    document.body.removeChild(ta);
    return ok;
  }

  async function copyTranscript() {
    const text = transcriptEl.textContent.trim();
    if (!text) { showToast('Nothing to copy'); return; }
    let ok = false;
    try {
      if (navigator.clipboard && window.isSecureContext) {
        await navigator.clipboard.writeText(text);
        ok = true;
      } else {
        ok = fallbackCopy(text);
      }
    } catch (_) {
      ok = fallbackCopy(text);
    }
    if (ok) {
      transcriptEl.classList.remove('copied');
      void transcriptEl.offsetWidth;
      transcriptEl.classList.add('copied');
      setTimeout(() => transcriptEl.classList.remove('copied'), 420);
      showToast('Copied!');
    } else {
      showToast('Copy failed');
    }
  }

  transcriptEl.addEventListener('click', copyTranscript);
  transcriptEl.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); copyTranscript(); }
  });

  if (!navigator.mediaDevices || !window.MediaRecorder) {
    statusEl.textContent = 'MediaRecorder not supported in this browser.';
    micBtn.disabled = true;
    return;
  }

  const MIME_CANDIDATES = [
    'audio/webm;codecs=opus',
    'audio/webm',
    'audio/ogg;codecs=opus',
    'audio/mp4',
  ];

  function pickMime() {
    return MIME_CANDIDATES.find(t => MediaRecorder.isTypeSupported(t)) || '';
  }

  function extForMime(mime) {
    if (mime.startsWith('audio/webm')) return 'webm';
    if (mime.startsWith('audio/ogg')) return 'ogg';
    if (mime.startsWith('audio/mp4')) return 'mp4';
    return 'webm';
  }

  function deviceLabel() {
    return 'pwa-' + (navigator.userAgent.match(/Android|iPhone|iPad/)?.[0] || 'web');
  }

  function setStatus(s) { statusEl.textContent = s; }
  function setLog(s) { logEl.textContent = s; }

  let mediaRecorder = null;
  let stream = null;
  let audioChunks = [];
  let recording = false;
  let startTs = 0;

  async function send(blob, mime) {
    setStatus('Transcribing...');
    const fd = new FormData();
    fd.append('file', blob, 'capture.' + extForMime(mime));
    fd.append('device', deviceLabel());
    fd.append('timestamp', new Date().toISOString());
    try {
      const r = await fetch('/api/v1/capture/audio', {
        method: 'POST',
        headers: { 'X-Jarvis-Key': key },
        body: fd,
      });
      if (!r.ok) {
        let detail = 'HTTP ' + r.status;
        try { const j = await r.json(); if (j && j.detail) detail = j.detail; } catch (_) {}
        throw new Error(detail);
      }
      const d = await r.json();
      const took = (typeof d.transcribe_seconds === 'number')
        ? ' (transcribed in ' + d.transcribe_seconds.toFixed(1) + 's)'
        : '';
      setStatus('Saved' + took);
      transcriptEl.textContent = d.transcript || '';
      setLog(d.routed_to ? d.routed_to.split('/').pop() : 'ok');
    } catch (e) {
      setStatus('Send failed: ' + e.message);
    }
  }

  function teardown() {
    if (stream) {
      stream.getTracks().forEach(t => t.stop());
      stream = null;
    }
    mediaRecorder = null;
    recording = false;
    micBtn.classList.remove('recording');
    micBtn.textContent = 'Tap to talk';
  }

  async function start() {
    transcriptEl.textContent = '';
    setLog('');
    try {
      stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    } catch (e) {
      setStatus('Mic access denied: ' + (e.message || e.name));
      return;
    }

    const mime = pickMime();
    audioChunks = [];
    try {
      mediaRecorder = mime ? new MediaRecorder(stream, { mimeType: mime }) : new MediaRecorder(stream);
    } catch (e) {
      setStatus('Recorder error: ' + e.message);
      teardown();
      return;
    }

    mediaRecorder.ondataavailable = (ev) => { if (ev.data && ev.data.size > 0) audioChunks.push(ev.data); };
    mediaRecorder.onerror = (ev) => setStatus('Recorder error: ' + ((ev.error && ev.error.name) || 'unknown'));
    mediaRecorder.onstop = async () => {
      const usedMime = (mediaRecorder && mediaRecorder.mimeType) || mime || 'audio/webm';
      teardown();
      if (!audioChunks.length) {
        setStatus('No audio captured');
        return;
      }
      const blob = new Blob(audioChunks, { type: usedMime });
      audioChunks = [];
      await send(blob, usedMime);
    };

    mediaRecorder.start();
    recording = true;
    startTs = Date.now();
    micBtn.classList.add('recording');
    micBtn.textContent = 'Stop';
    setStatus('Recording... tap to stop');
  }

  function stop() {
    if (mediaRecorder && mediaRecorder.state !== 'inactive') {
      mediaRecorder.stop();
    } else {
      teardown();
    }
  }

  micBtn.addEventListener('click', () => {
    if (recording) stop(); else start();
  });
})();
</script>
</body>
</html>
