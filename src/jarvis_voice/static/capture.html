<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#0b0b0b">
<meta name="jarvis-key" content="__JARVIS_KEY__">
<link rel="manifest" href="/manifest.json">
<title>Jarvis Capture</title>
<style>
  :root { color-scheme: dark; }
  html, body { margin: 0; padding: 0; height: 100%; background: #0b0b0b; color: #eee;
    font-family: -apple-system, Roboto, system-ui, sans-serif; }
  main { display: flex; flex-direction: column; align-items: center; justify-content: center;
    height: 100dvh; padding: env(safe-area-inset-top) 16px env(safe-area-inset-bottom); gap: 24px; }
  button#mic { width: 200px; height: 200px; border-radius: 50%; border: none;
    background: #c93b3b; color: #fff; font-size: 20px; font-weight: 600;
    box-shadow: 0 8px 32px rgba(201,59,59,.4); touch-action: manipulation; }
  button#mic.recording { background: #3bc97a; animation: pulse 1.2s infinite; }
  button#mic:disabled { opacity: .5; }
  @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
  #status { font-size: 14px; opacity: .7; min-height: 1.4em; text-align: center; }
  #transcript { width: 100%; max-width: 480px; min-height: 80px; padding: 12px;
    background: #1a1a1a; border-radius: 12px; font-size: 15px; line-height: 1.4;
    white-space: pre-wrap; overflow-wrap: anywhere; }
  #log { width: 100%; max-width: 480px; font-size: 12px; opacity: .6; min-height: 1.2em; text-align: center; }
</style>
</head>
<body>
<main>
  <div id="transcript" aria-live="polite"></div>
  <button id="mic" type="button">Tap to talk</button>
  <div id="status">Ready</div>
  <div id="log"></div>
</main>
<script>
(() => {
  const key = document.querySelector('meta[name=jarvis-key]').content;
  const micBtn = document.getElementById('mic');
  const statusEl = document.getElementById('status');
  const transcriptEl = document.getElementById('transcript');
  const logEl = document.getElementById('log');

  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) {
    statusEl.textContent = 'Web Speech API not supported. Use Chrome on Android.';
    micBtn.disabled = true;
    return;
  }

  let rec = null;
  let recording = false;
  let startTs = 0;
  let finalText = '';
  let manualStop = false;

  const FATAL_ERRORS = new Set(['not-allowed', 'service-not-allowed', 'audio-capture', 'network', 'aborted']);

  function setStatus(s) { statusEl.textContent = s; }
  function setLog(s) { logEl.textContent = s; }

  async function send(transcript, durationSec) {
    setStatus('Sending...');
    try {
      const r = await fetch('/api/v1/capture/voice', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'X-Jarvis-Key': key },
        body: JSON.stringify({
          transcript: transcript.trim(),
          timestamp: new Date().toISOString(),
          device: 'pwa-' + (navigator.userAgent.match(/Android|iPhone|iPad/)?.[0] || 'web'),
          duration_seconds: Math.round(durationSec),
          model: 'web-speech-api',
        }),
      });
      if (!r.ok) throw new Error('HTTP ' + r.status);
      const d = await r.json();
      setStatus('Saved');
      setLog(d.routed_to ? d.routed_to.split('/').pop() : 'ok');
    } catch (e) {
      setStatus('Send failed: ' + e.message);
    }
  }

  function finalize() {
    recording = false;
    micBtn.classList.remove('recording');
    micBtn.textContent = 'Tap to talk';
    const text = transcriptEl.textContent.trim();
    if (text) send(text, (Date.now() - startTs) / 1000);
    else setStatus('No speech detected');
  }

  function buildRecognizer() {
    const r = new SR();
    r.lang = 'en-US';
    r.continuous = true;
    r.interimResults = true;
    r.onresult = (ev) => {
      let interim = '';
      for (let i = ev.resultIndex; i < ev.results.length; i++) {
        const t = ev.results[i][0].transcript;
        if (ev.results[i].isFinal) finalText += t + ' ';
        else interim += t;
      }
      transcriptEl.textContent = (finalText + interim).trim();
    };
    r.onerror = (e) => {
      if (FATAL_ERRORS.has(e.error)) {
        manualStop = true;
        setStatus('Error: ' + e.error);
      }
    };
    r.onend = () => {
      if (manualStop || !recording) {
        finalize();
        return;
      }
      try {
        rec.start();
        setStatus('Listening...');
      } catch (err) {
        manualStop = true;
        setStatus('Restart failed: ' + (err && err.message ? err.message : err));
        finalize();
      }
    };
    return r;
  }

  function start() {
    finalText = '';
    manualStop = false;
    transcriptEl.textContent = '';
    rec = buildRecognizer();
    rec.start();
    recording = true;
    startTs = Date.now();
    micBtn.classList.add('recording');
    micBtn.textContent = 'Stop';
    setStatus('Listening...');
    setLog('');
  }

  function stop() {
    if (!rec) return;
    manualStop = true;
    rec.stop();
  }

  micBtn.addEventListener('click', () => {
    if (recording) stop(); else start();
  });
})();
</script>
</body>
</html>
